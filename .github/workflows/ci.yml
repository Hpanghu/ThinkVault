name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          pyproject.toml
          requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-asyncio pytest-anyio

    - name: Run tests
      run: |
        python -m pytest test/test_unit_db.py test/test_unit_llm.py test/test_unit_embedder.py test/test_unit_retriever.py test/test_unit_parser.py test/test_unit_chunker.py test/test_unit_storage.py test/test_ssrf_protection.py test/test_hardware.py -v --tb=short

    - name: Run integration tests
      run: |
        python -m pytest test/test_api_integration.py -v --tb=short -x

    - name: Run tests with coverage
      run: |
        python -m pytest test/test_unit_db.py test/test_unit_llm.py test/test_unit_embedder.py test/test_unit_retriever.py test/test_unit_parser.py test/test_unit_chunker.py test/test_unit_storage.py test/test_ssrf_protection.py --cov=thinkvault --cov-report=term-missing --cov-fail-under=30

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: |
          pyproject.toml
          requirements.txt

    - name: Install linting tools
      run: |
        pip install black flake8 mypy types-psutil types-openpyxl types-appdirs

    - name: Run Black
      run: black --check --line-length=120 thinkvault/

    - name: Run Flake8
      run: flake8 --max-line-length=120 --ignore=E501,W503 thinkvault/

    - name: Run mypy
      run: mypy thinkvault/core/ --ignore-missing-imports