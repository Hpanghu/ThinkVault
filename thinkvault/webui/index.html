<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkVault — 个人 AI 工作台</title>
<link rel="stylesheet" href="/style.css">
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
</head>
<body>
<div class="app-container">

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-row">
            <h1 class="logo">ThinkVault</h1>
            <span class="version-badge">v2.0</span>
        </div>
        <button class="btn-icon sidebar-toggle" id="btnToggleSidebar" title="收起侧边栏">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
    </div>

    <div class="model-status" id="modelStatus">
        <span class="status-dot offline"></span>
        <span class="status-text">模型未加载</span>
    </div>
    <div class="model-progress" id="modelProgress" style="display:none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText"></span>
    </div>

    <!-- 会话列表（V2.0 新增） -->
    <div class="sidebar-section conv-section">
        <div class="section-title">
            <span>会话</span>
            <button class="btn-icon-sm" id="btnNewConv" title="新建会话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>
        <ul class="conv-list" id="convList">
            <li class="conv-empty">暂无会话</li>
        </ul>
    </div>

    <!-- 文档列表 -->
    <div class="sidebar-section">
        <div class="section-title">
            <span>文档</span>
            <button class="btn-icon-sm" id="btnUploadDoc" title="上传文档">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
        </div>
        <ul class="doc-list" id="docList">
            <li class="doc-empty">暂无文档</li>
        </ul>
    </div>

    <!-- 模型设置（可折叠） -->
    <details class="sidebar-section model-settings">
        <summary class="section-title"><span>模型设置</span></summary>
        <div class="setting-row">
            <label>模型路径</label>
            <input type="text" id="modelPath" placeholder="GGUF 路径..." value="">
        </div>
        <div class="setting-row">
            <label>上下文长度</label>
            <input type="number" id="nCtx" value="2048" min="512" max="8192">
        </div>
        <div class="setting-row btn-row">
            <button class="btn" id="btnLoadModel">加载模型</button>
            <button class="btn btn-secondary" id="btnUnloadModel">卸载</button>
        </div>
    </details>

    <div class="sidebar-footer">
        <div class="footer-row">
            <span class="footer-label">主题</span>
            <button class="theme-toggle" id="btnToggleTheme" title="切换深色/浅色模式">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
        </div>
    </div>
</aside>

<main class="main-area">
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2>ThinkVault V2.0</h2>
                <p>上传文档后提问，支持多会话管理和 SSE 流式推理</p>
                <div class="welcome-actions">
                    <button class="btn btn-lg" id="btnWelcomeUpload">上传文档</button>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-row">
                <button class="btn-icon-input" id="btnFileUpload" title="上传文档">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="chatInput" placeholder="输入问题..." rows="1"></textarea>
                <button class="btn-send" id="btnSend" title="发送">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <p class="input-hint">本地运行 · 基于已上传文档 · 支持流式输出</p>
        </div>
    </div>

    <input type="file" id="fileInput" multiple accept=".pdf,.docx,.pptx,.xlsx,.xlsm,.txt,.md,.markdown" hidden>
</main>

</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/app.js"></script>
</body>
</html>
